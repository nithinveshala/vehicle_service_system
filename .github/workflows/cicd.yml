name: Vehicle Service CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  ci:
    name: Test and Validate
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: ci-secret-key
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      SECURE_SSL_REDIRECT: "True"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check for missing migrations
        run: python vehicle_service/manage.py makemigrations --check --dry-run

      - name: Apply migrations
        run: python vehicle_service/manage.py migrate --noinput

      - name: Run Django tests
        run: python vehicle_service/manage.py test

      - name: Run deployment checks
        run: python vehicle_service/manage.py check --deploy

      - name: Collect static files
        run: python vehicle_service/manage.py collectstatic --noinput

  cd:
    name: Build Delivery Artifact
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare release bundle
        run: |
          mkdir -p build
          zip -r build/vehicle-service-system.zip \
            vehicle_service \
            requirements.txt \
            .github \
            -x "*/__pycache__/*" \
            -x "*/db.sqlite3" \
            -x "*/.venv/*" \
            -x "*/venv/*" \
            -x "*/env/*"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vehicle-service-system-build
          path: build/vehicle-service-system.zip
