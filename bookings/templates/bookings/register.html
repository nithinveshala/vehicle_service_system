{% extends 'bookings/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="hero-panel mb-4">
            <span class="pill-tag mb-3">New Customer</span>
            <h2 class="section-title">Create your account</h2>
            <p class="section-copy">Register once to access vehicle service booking features and customer actions.</p>
        </div>

        <div class="data-card form-panel">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-flex flex-wrap gap-3 align-items-center">
                    <button type="submit" class="btn-soft btn-accent">Register</button>
                    <a href="{% url 'login' %}" class="btn-soft">Already have an account?</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
