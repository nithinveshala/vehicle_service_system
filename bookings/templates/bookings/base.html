<!DOCTYPE html>
<html>
<head>
    <title>Vehicle Service System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<nav class="mb-4">
    <a href="/" class="btn btn-primary">Home</a>
    <a href="/vehicles/" class="btn btn-secondary">Vehicles</a>
    <a href="/services/" class="btn btn-secondary">Services</a>
    <a href="/bookings/" class="btn btn-secondary">Bookings</a>

    {% if user.is_authenticated %}
        <a href="/logout/" class="btn btn-danger float-end">Logout</a>
    {% else %}
        <a href="/login/" class="btn btn-success float-end">Login</a>
    {% endif %}
</nav>

{% block content %}
{% endblock %}

</body>
</html>
